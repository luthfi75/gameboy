<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Sky gradient -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a3e"/>
      <stop offset="30%" stop-color="#2d1b69"/>
      <stop offset="60%" stop-color="#5c2d91"/>
      <stop offset="100%" stop-color="#ff6b9d"/>
    </linearGradient>
    <!-- Sun gradient -->
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff4081"/>
      <stop offset="50%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <!-- Grid gradient fade -->
    <linearGradient id="gridFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b9d" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff6b9d" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ff6b9d" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <rect x="120" y="40" width="2" height="2"/>
    <rect x="300" y="80" width="2" height="2"/>
    <rect x="500" y="30" width="3" height="3"/>
    <rect x="700" y="100" width="2" height="2"/>
    <rect x="900" y="50" width="2" height="2"/>
    <rect x="1100" y="70" width="3" height="3"/>
    <rect x="1300" y="40" width="2" height="2"/>
    <rect x="1500" y="90" width="2" height="2"/>
    <rect x="1700" y="60" width="2" height="2"/>
    <rect x="200" y="150" width="2" height="2"/>
    <rect x="450" y="130" width="2" height="2"/>
    <rect x="800" y="160" width="3" height="3"/>
    <rect x="1050" y="140" width="2" height="2"/>
    <rect x="1400" y="120" width="2" height="2"/>
    <rect x="1650" y="170" width="2" height="2"/>
    <rect x="350" y="200" width="2" height="2"/>
    <rect x="650" y="220" width="2" height="2"/>
    <rect x="1200" y="190" width="2" height="2"/>
    <rect x="1550" y="210" width="3" height="3"/>
    <rect x="100" y="250" width="2" height="2"/>
    <rect x="1800" y="130" width="2" height="2"/>
    <rect x="50" y="100" width="2" height="2"/>
    <rect x="1880" y="45" width="2" height="2"/>
    <rect x="960" y="20" width="2" height="2"/>
  </g>

  <!-- Sun/Moon -->
  <circle cx="960" cy="500" r="120" fill="url(#sun)" opacity="0.9"/>
  <!-- Sun horizontal lines -->
  <g fill="#1a0a3e" opacity="0.3">
    <rect x="840" y="480" width="240" height="4"/>
    <rect x="840" y="500" width="240" height="6"/>
    <rect x="840" y="520" width="240" height="8"/>
    <rect x="840" y="545" width="240" height="10"/>
    <rect x="840" y="570" width="240" height="14"/>
    <rect x="840" y="598" width="240" height="22"/>
  </g>

  <!-- Retro grid floor -->
  <rect x="0" y="650" width="1920" height="430" fill="url(#gridFade)"/>
  <!-- Horizontal grid lines -->
  <g stroke="#ff6b9d" stroke-opacity="0.4" stroke-width="1" fill="none">
    <line x1="0" y1="680" x2="1920" y2="680"/>
    <line x1="0" y1="720" x2="1920" y2="720"/>
    <line x1="0" y1="770" x2="1920" y2="770"/>
    <line x1="0" y1="830" x2="1920" y2="830"/>
    <line x1="0" y1="900" x2="1920" y2="900"/>
    <line x1="0" y1="990" x2="1920" y2="990"/>
  </g>
  <!-- Vertical grid lines (perspective) -->
  <g stroke="#ff6b9d" stroke-opacity="0.3" stroke-width="1" fill="none">
    <line x1="960" y1="650" x2="-400" y2="1080"/>
    <line x1="960" y1="650" x2="100" y2="1080"/>
    <line x1="960" y1="650" x2="400" y2="1080"/>
    <line x1="960" y1="650" x2="630" y2="1080"/>
    <line x1="960" y1="650" x2="800" y2="1080"/>
    <line x1="960" y1="650" x2="960" y2="1080"/>
    <line x1="960" y1="650" x2="1120" y2="1080"/>
    <line x1="960" y1="650" x2="1290" y2="1080"/>
    <line x1="960" y1="650" x2="1520" y2="1080"/>
    <line x1="960" y1="650" x2="1820" y2="1080"/>
    <line x1="960" y1="650" x2="2320" y2="1080"/>
  </g>

  <!-- Pixel cityscape silhouette - far back -->
  <g fill="#1a0a3e" opacity="0.6">
    <!-- Far buildings left -->
    <rect x="50" y="520" width="40" height="130"/>
    <rect x="100" y="500" width="30" height="150"/>
    <rect x="140" y="540" width="50" height="110"/>
    <rect x="200" y="480" width="35" height="170"/>
    <rect x="250" y="530" width="45" height="120"/>
    <rect x="310" y="510" width="30" height="140"/>
    <!-- Far buildings right -->
    <rect x="1550" y="510" width="40" height="140"/>
    <rect x="1600" y="490" width="35" height="160"/>
    <rect x="1650" y="530" width="50" height="120"/>
    <rect x="1710" y="500" width="30" height="150"/>
    <rect x="1760" y="540" width="45" height="110"/>
    <rect x="1820" y="520" width="40" height="130"/>
  </g>

  <!-- Pixel cityscape - mid layer -->
  <g fill="#2d1b69">
    <!-- Left side buildings -->
    <rect x="0" y="480" width="60" height="170"/>
    <rect x="70" y="440" width="50" height="210"/>
    <rect x="85" y="430" width="20" height="10"/>
    <rect x="130" y="470" width="70" height="180"/>
    <rect x="210" y="420" width="45" height="230"/>
    <rect x="225" y="410" width="15" height="10"/>
    <rect x="265" y="460" width="55" height="190"/>
    <rect x="330" y="440" width="40" height="210"/>
    <rect x="380" y="490" width="60" height="160"/>
    <rect x="450" y="460" width="35" height="190"/>
    <rect x="495" y="500" width="50" height="150"/>

    <!-- Right side buildings -->
    <rect x="1350" y="490" width="50" height="160"/>
    <rect x="1410" y="450" width="45" height="200"/>
    <rect x="1465" y="470" width="60" height="180"/>
    <rect x="1535" y="430" width="40" height="220"/>
    <rect x="1550" y="420" width="12" height="10"/>
    <rect x="1585" y="460" width="55" height="190"/>
    <rect x="1650" y="440" width="70" height="210"/>
    <rect x="1730" y="420" width="50" height="230"/>
    <rect x="1745" y="410" width="20" height="10"/>
    <rect x="1790" y="470" width="60" height="180"/>
    <rect x="1860" y="450" width="60" height="200"/>
  </g>

  <!-- Pixel cityscape - front layer -->
  <g fill="#3d2080">
    <!-- Center-left -->
    <rect x="500" y="520" width="80" height="130"/>
    <rect x="520" y="510" width="12" height="10"/>
    <rect x="590" y="480" width="60" height="170"/>
    <rect x="660" y="510" width="70" height="140"/>
    <rect x="740" y="490" width="50" height="160"/>

    <!-- Center-right -->
    <rect x="1130" y="500" width="60" height="150"/>
    <rect x="1200" y="480" width="70" height="170"/>
    <rect x="1280" y="520" width="55" height="130"/>
  </g>

  <!-- Building windows (lit up) -->
  <g fill="#ff6b9d" opacity="0.5">
    <!-- Left buildings windows -->
    <rect x="80" y="455" width="4" height="4"/>
    <rect x="90" y="455" width="4" height="4"/>
    <rect x="80" y="465" width="4" height="4"/>
    <rect x="100" y="455" width="4" height="4"/>
    <rect x="220" y="435" width="4" height="4"/>
    <rect x="230" y="435" width="4" height="4"/>
    <rect x="220" y="445" width="4" height="4"/>
    <rect x="230" y="445" width="4" height="4"/>
    <rect x="145" y="485" width="4" height="4"/>
    <rect x="155" y="485" width="4" height="4"/>
    <rect x="165" y="485" width="4" height="4"/>
    <rect x="145" y="495" width="4" height="4"/>
    <rect x="165" y="495" width="4" height="4"/>
    <rect x="340" y="455" width="4" height="4"/>
    <rect x="350" y="455" width="4" height="4"/>
    <rect x="340" y="465" width="4" height="4"/>
    <rect x="350" y="465" width="4" height="4"/>
    <!-- Right buildings windows -->
    <rect x="1545" y="445" width="4" height="4"/>
    <rect x="1555" y="445" width="4" height="4"/>
    <rect x="1545" y="455" width="4" height="4"/>
    <rect x="1660" y="455" width="4" height="4"/>
    <rect x="1670" y="455" width="4" height="4"/>
    <rect x="1680" y="455" width="4" height="4"/>
    <rect x="1660" y="465" width="4" height="4"/>
    <rect x="1680" y="465" width="4" height="4"/>
    <rect x="1740" y="435" width="4" height="4"/>
    <rect x="1750" y="435" width="4" height="4"/>
    <rect x="1760" y="435" width="4" height="4"/>
    <rect x="1740" y="445" width="4" height="4"/>
    <rect x="1750" y="445" width="4" height="4"/>
    <rect x="1760" y="445" width="4" height="4"/>
  </g>
  <g fill="#00ffff" opacity="0.4">
    <rect x="90" y="465" width="4" height="4"/>
    <rect x="100" y="465" width="4" height="4"/>
    <rect x="155" y="495" width="4" height="4"/>
    <rect x="230" y="455" width="4" height="4"/>
    <rect x="350" y="475" width="4" height="4"/>
    <rect x="1555" y="455" width="4" height="4"/>
    <rect x="1670" y="465" width="4" height="4"/>
    <rect x="1750" y="455" width="4" height="4"/>
  </g>

  <!-- Glow effect at horizon -->
  <rect x="0" y="600" width="1920" height="100" fill="#ff6b9d" opacity="0.15"/>
  <rect x="0" y="640" width="1920" height="30" fill="#ffd700" opacity="0.08"/>
</svg>